services:
  api:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      # Bind mount: the SQLite file lives in a real folder on the host
      # (server/data/data.db), so it's visible, easy to back up, and portable
      # to another machine by copying the folder. The container writes to /data
      # (see DB_PATH=/data/data.db in server/Dockerfile).
      - ./server/data:/data
    environment:
      # Set in a .env file (or the shell) to require a bearer token on the
      # API — do this whenever the API is reachable beyond localhost.
      - CORTEX_TOKEN=${CORTEX_TOKEN:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    restart: unless-stopped

  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped
