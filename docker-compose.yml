services:
  api:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - pt-data:/data
    environment:
      # Set in a .env file (or the shell) to require a bearer token on the
      # API — do this whenever the API is reachable beyond localhost.
      - CORTEX_TOKEN=${CORTEX_TOKEN:-}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    restart: unless-stopped

  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pt-data:
    # Use the volume created under the old project name so existing SQLite
    # data survives the folder rename. Docker Compose prefixes named volumes
    # with the project name, which changed from project-tracker -> cortex.
    external: true
    name: project-tracker_pt-data
