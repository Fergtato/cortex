  <rect x="0.5" y="0.5" width="31" height="31" fill="none" stroke="#5a5a52"/>
  <rect x="8" y="8" width="8" height="8" fill="#7fd17f"/>
  <rect x="16" y="16" width="8" height="8" fill="#7fd17f"/>
</svg>
